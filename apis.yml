- aid: watchguard:watchguard-endpoint-security-api
  name: WatchGuard Endpoint Security Management API
  description: RESTful API for managing WatchGuard Endpoint Security (WES) devices and security operations. Provides device
    listing and protection status, device isolation and release, immediate scan initiation, security event counters and exports,
    security overview, risk assessment summaries, and configuration management.
