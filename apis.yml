aid: watchguard
name: WatchGuard
description: WatchGuard provides cloud-managed network and endpoint security solutions including Firebox next-generation firewalls,
  WatchGuard Endpoint Security (WES), AuthPoint multi-factor authentication, and WatchGuard Wi-Fi. WatchGuard Cloud is the
  unified management platform exposing RESTful APIs for account management, device activation, asset allocation, endpoint
  device management, security event monitoring, and operator administration.
url: https://www.watchguard.com
