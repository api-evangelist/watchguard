apis:
- aid: watchguard:watchguard-cloud-platform-api
  name: WatchGuard Cloud Platform API
  description: RESTful API for managing WatchGuard Cloud accounts, sub-accounts, and users. Provides account creation and
    management, audience token generation for managed account access, hardware/license activation, asset allocation, and operator
    management. Uses OAuth 2.0 bearer tokens and WatchGuard API Key header authentication.
  humanURL: https://www.watchguard.com/help/docs/API/Content/en-US/watchguard-cloud/watchguard-cloud.html
