naftiko: "1.0.0-alpha1"

info:
  label: "WatchGuard Endpoint Security Management API"
  description: "WatchGuard Endpoint Security Management API for device management, security events, risk assessment, and configuration."
  tags:
    - WatchGuard
    - Endpoint Security
    - Device Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WATCHGUARD_ACCESS_TOKEN: WATCHGUARD_ACCESS_TOKEN
      WATCHGUARD_API_KEY: WATCHGUARD_API_KEY

capability:
  consumes:
    - type: http
      namespace: wg-endpoint
      baseUri: https://api.usa.cloud.watchguard.com/rest/endpoint-security/management/api/v1
      description: "WatchGuard Endpoint Security Management API."
      authentication:
        type: bearer
        token: "{{WATCHGUARD_ACCESS_TOKEN}}"
      resources:
        - name: devices
          path: /accounts/{accountId}/devices
          description: "Managed endpoint devices."
          operations:
            - name: list-devices
              method: GET
              description: "List all managed endpoint devices."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "WatchGuard Cloud account ID."
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Number of records to return."
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: "Records to skip."
                - name: $search
                  in: query
                  type: string
                  required: false
                  description: "Text search."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: device-protection-status
          path: /accounts/{accountId}/devicesprotectionstatus
          description: "Protection status for all devices."
          operations:
            - name: get-devices-protection-status
              method: GET
              description: "Get protection status for all managed devices."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "WatchGuard Cloud account ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: device-isolation
          path: /accounts/{accountId}/devices/isolation
          description: "Isolate devices from network communication."
          operations:
            - name: isolate-devices
              method: POST
              description: "Isolate specified devices from the network."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "WatchGuard Cloud account ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  device_ids: "{{tools.device_ids}}"
                  customized_message: "{{tools.customized_message}}"

        - name: device-no-isolation
          path: /accounts/{accountId}/devices/noisolation
          description: "Remove device isolation."
          operations:
            - name: remove-device-isolation
              method: POST
              description: "Remove network isolation from devices."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "WatchGuard Cloud account ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  device_ids: "{{tools.device_ids}}"

        - name: security-overview
          path: /accounts/{accountId}/securityoverview/{period}
          description: "Security overview summary."
          operations:
            - name: get-security-overview
              method: GET
              description: "Get security overview for 1, 7, or 30 days."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "WatchGuard Cloud account ID."
                - name: period
                  in: path
                  type: integer
                  required: true
                  description: "Period in days (1, 7, or 30)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: risk-summary
          path: /accounts/{accountId}/riskassessment/companyrisksummary
          description: "Company-wide risk assessment summary."
          operations:
            - name: get-company-risk-summary
              method: GET
              description: "Get company risk summary by severity."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "WatchGuard Cloud account ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: detected-risks
          path: /accounts/{accountId}/riskassessment/detectedrisks
          description: "Detected risk counts by type."
          operations:
            - name: get-detected-risks
              method: GET
              description: "Get detected risks with optional OS and device type filters."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "WatchGuard Cloud account ID."
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: immediate-scan
          path: /accounts/{accountId}/immediatescan
          description: "Start an immediate security scan."
          operations:
            - name: start-immediate-scan
              method: POST
              description: "Initiate an immediate malware scan on specified devices."
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "WatchGuard Cloud account ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  device_ids: "{{tools.device_ids}}"
                  task_name: "{{tools.task_name}}"
                  scan_scope: "{{tools.scan_scope}}"

  exposes:
    - type: rest
      port: 8102
      namespace: wg-endpoint-rest
      resources:
        - path: /v1/devices
          operations:
            - method: GET
              name: list-devices
              description: "List managed endpoint devices."
              call: "wg-endpoint.list-devices"
              with:
                accountId: "rest.accountId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: wg-endpoint-mcp
      transport: http
      tools:
        - name: list-devices
          description: "List WatchGuard managed endpoint devices."
          hints:
            readOnly: true
            openWorld: true
          call: "wg-endpoint.list-devices"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-devices-protection-status
          description: "Get protection status for all managed WatchGuard endpoint devices."
          hints:
            readOnly: true
            openWorld: true
          call: "wg-endpoint.get-devices-protection-status"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: isolate-devices
          description: "Isolate WatchGuard endpoint devices from network communication."
          hints:
            readOnly: false
            destructive: true
          call: "wg-endpoint.isolate-devices"
          with:
            accountId: "tools.accountId"
            device_ids: "tools.device_ids"
            customized_message: "tools.customized_message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: remove-device-isolation
          description: "Remove network isolation from WatchGuard endpoint devices."
          hints:
            readOnly: false
            idempotent: true
          call: "wg-endpoint.remove-device-isolation"
          with:
            accountId: "tools.accountId"
            device_ids: "tools.device_ids"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-security-overview
          description: "Get WatchGuard endpoint security overview for 1, 7, or 30 days."
          hints:
            readOnly: true
            openWorld: true
          call: "wg-endpoint.get-security-overview"
          with:
            accountId: "tools.accountId"
            period: "tools.period"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-company-risk-summary
          description: "Get company-wide endpoint risk summary categorized by severity."
          hints:
            readOnly: true
            openWorld: true
          call: "wg-endpoint.get-company-risk-summary"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-detected-risks
          description: "Get detected endpoint security risks by type and device."
          hints:
            readOnly: true
            openWorld: true
          call: "wg-endpoint.get-detected-risks"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: start-immediate-scan
          description: "Start an immediate malware scan on WatchGuard endpoint devices."
          hints:
            readOnly: false
            destructive: false
          call: "wg-endpoint.start-immediate-scan"
          with:
            accountId: "tools.accountId"
            device_ids: "tools.device_ids"
            task_name: "tools.task_name"
            scan_scope: "tools.scan_scope"
          outputParameters:
            - type: object
              mapping: "$."
