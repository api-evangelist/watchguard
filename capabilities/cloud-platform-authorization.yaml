naftiko: 1.0.0-alpha2
info:
  label: WatchGuard Cloud Platform API — Authorization
  description: 'WatchGuard Cloud Platform API — Authorization. 1 operations. Lead operation: Get Audience Token. Self-contained
    Naftiko capability covering one Watchguard business surface.'
  tags:
  - Watchguard
  - Authorization
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WATCHGUARD_API_KEY: WATCHGUARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-platform-authorization
    baseUri: https://api.usa.cloud.watchguard.com/rest
    description: WatchGuard Cloud Platform API — Authorization business capability. Self-contained, no shared references.
    resources:
    - name: platform-authorization-v1-audiences
      path: /platform/authorization/v1/audiences
      operations:
      - name: getaudience
        method: POST
        description: Get Audience Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WATCHGUARD_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-platform-authorization-rest
    port: 8080
    description: REST adapter for WatchGuard Cloud Platform API — Authorization. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/platform/authorization/v1/audiences
      name: platform-authorization-v1-audiences
      description: REST surface for platform-authorization-v1-audiences.
      operations:
      - method: POST
        name: getaudience
        description: Get Audience Token
        call: cloud-platform-authorization.getaudience
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-platform-authorization-mcp
    port: 9090
    transport: http
    description: MCP adapter for WatchGuard Cloud Platform API — Authorization. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-audience-token
      description: Get Audience Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: cloud-platform-authorization.getaudience
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
