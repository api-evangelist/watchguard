naftiko: 1.0.0-alpha2
info:
  label: WatchGuard Cloud Platform API — Accounts
  description: 'WatchGuard Cloud Platform API — Accounts. 5 operations. Lead operation: Get Account Information. Self-contained
    Naftiko capability covering one Watchguard business surface.'
  tags:
  - Watchguard
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WATCHGUARD_API_KEY: WATCHGUARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-platform-accounts
    baseUri: https://api.usa.cloud.watchguard.com/rest
    description: WatchGuard Cloud Platform API — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: platform-accounts-v1-accounts-accountId
      path: /platform/accounts/v1/accounts/{accountId}
      operations:
      - name: getaccount
        method: GET
        description: Get Account Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: Specify additional fields to include in the response.
      - name: createaccount
        method: POST
        description: Create Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: updateaccount
        method: PATCH
        description: Update Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteaccount
        method: DELETE
        description: Delete Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: force
          in: query
          type: boolean
          description: If true, delete the account and all managed sub-accounts.
    - name: platform-accounts-v1-accounts-accountId-children
      path: /platform/accounts/v1/accounts/{accountId}/children
      operations:
      - name: getmanagedaccounts
        method: GET
        description: Get Managed Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: integer
          description: Filter by account type (0=All, 1=Service Provider, 2=Subscriber).
        - name: sortBy
          in: query
          type: string
        - name: sortOrder
          in: query
          type: string
        - name: offset
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: name
          in: query
          type: string
          description: Filter accounts by name.
        - name: includeDelegatedAccounts
          in: query
          type: boolean
    authentication:
      type: bearer
      token: '{{env.WATCHGUARD_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-platform-accounts-rest
    port: 8080
    description: REST adapter for WatchGuard Cloud Platform API — Accounts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/platform/accounts/v1/accounts/{accountid}
      name: platform-accounts-v1-accounts-accountid
      description: REST surface for platform-accounts-v1-accounts-accountId.
      operations:
      - method: GET
        name: getaccount
        description: Get Account Information
        call: cloud-platform-accounts.getaccount
        with:
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createaccount
        description: Create Account
        call: cloud-platform-accounts.createaccount
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateaccount
        description: Update Account
        call: cloud-platform-accounts.updateaccount
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteaccount
        description: Delete Account
        call: cloud-platform-accounts.deleteaccount
        with:
          force: rest.force
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/platform/accounts/v1/accounts/{accountid}/children
      name: platform-accounts-v1-accounts-accountid-children
      description: REST surface for platform-accounts-v1-accounts-accountId-children.
      operations:
      - method: GET
        name: getmanagedaccounts
        description: Get Managed Accounts
        call: cloud-platform-accounts.getmanagedaccounts
        with:
          type: rest.type
          sortBy: rest.sortBy
          sortOrder: rest.sortOrder
          offset: rest.offset
          limit: rest.limit
          name: rest.name
          includeDelegatedAccounts: rest.includeDelegatedAccounts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-platform-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for WatchGuard Cloud Platform API — Accounts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-account-information
      description: Get Account Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-platform-accounts.getaccount
      with:
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: create-account
      description: Create Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-platform-accounts.createaccount
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-account
      description: Update Account
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cloud-platform-accounts.updateaccount
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-account
      description: Delete Account
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: cloud-platform-accounts.deleteaccount
      with:
        force: tools.force
      outputParameters:
      - type: object
        mapping: $.
    - name: get-managed-accounts
      description: Get Managed Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-platform-accounts.getmanagedaccounts
      with:
        type: tools.type
        sortBy: tools.sortBy
        sortOrder: tools.sortOrder
        offset: tools.offset
        limit: tools.limit
        name: tools.name
        includeDelegatedAccounts: tools.includeDelegatedAccounts
      outputParameters:
      - type: object
        mapping: $.
